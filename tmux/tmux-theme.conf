# -- Status Bar --
set -g status-position top
set -g status-justify absolute-centre
set -g status-interval 1
set -g status-left-length 100
set -g status-right-length 100

# Tokyo Night palette mapped to Catppuccin-like variable names
set -g @thm_bg "#1a1b26"
set -g @thm_fg "#c0caf5"
set -g @thm_surface_2 "#565f89"
set -g @thm_flamingo "#7aa2f7"
set -g @thm_blue "#7aa2f7"
set -g @thm_mauve "#bb9af7"
set -g @thm_yellow "#e0af68"

# Auto-rename windows to the current path
set-window-option -g window-status-style 'fg=#{@thm_surface_2}'
set-window-option -g window-status-current-style 'italics'
set-window-option -g automatic-rename on
set-window-option -g automatic-rename-format '#{b:pane_current_path}'

# Status bar modules
if-shell 'test "$(uname -s)" = "Darwin"' \
  'set -g status-left "#[fg=#{@thm_surface_2}]#{nowplaying}"' \
  'set -g status-left ""'
set -g status-right "#[fg=#{@thm_flamingo}]#S"

# Window styles
set-option -g window-status-style 'fg=#{@thm_surface_2}'
set-option -g window-status-current-style 'italics'
set-option -g window-status-format " #W"
set-option -g window-status-current-format " #W#{?window_zoomed_flag, 󰊓,}"
set-option -g window-status-separator "#[fg=#3b4261]•"

# Status background
set -g status-style "bg=default,fg=#{@thm_fg}"

# Pane borders, no pane titles
set -g pane-border-status off
set -g pane-border-style "fg=#{@thm_surface_2}"
set -g pane-active-border-style "fg=#{@thm_flamingo}"

# Other UI
set -g menu-selected-style "fg=#{@thm_fg},italics"
set -g message-style "fg=#{@thm_fg},bg=#{@thm_bg}"
set -g mode-style "fg=#{@thm_bg},bg=#{@thm_flamingo}"
