# Load Core Settings
source-file ~/.config/tmux/tmux-core.conf

# Load Keybindings
source-file ~/.config/tmux/tmux-keys.conf

# Keep TPM-managed plugins with the rest of this XDG-style tmux config.
set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/plugins/

# Load Plugin list and settings
source-file ~/.config/tmux/tmux-plugins.conf

# Load Theme and Appearance Settings
source-file ~/.config/tmux/tmux-theme.conf

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
if-shell 'test -x ~/.config/tmux/plugins/tpm/tpm' \
  'run ~/.config/tmux/plugins/tpm/tpm' \
  'run ~/.tmux/plugins/tpm/tpm'
